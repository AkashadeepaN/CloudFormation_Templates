AWSTemplateFormatVersion: '2010-09-09'

Description: This will create EC2 Instance with Tags Attached.

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0912f71e06545ad88
      InstanceType: t3.micro
      Tags:
        - Key: Name
          Value: Web-Server-Host