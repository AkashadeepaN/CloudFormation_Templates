AWSTemplateFormatVersion: '2010-09-09'

Description: Details about My Stack

Parameters:
  MyInstanceName:
    Description: My EC2
    Type: String
  KeyName:
    Description: enter the key name
    Type: AWS::EC2::KeyPair::KeyName
      


Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0ff8a91507f77f867
    us-east-2:
      AMI: ami-0b59bfac6be064b78
    ap-south-1:
      AMI: ami-0912f71e06545ad88


Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: 
        Fn::FindInMap:
          - RegionMap
          - !Ref AWS::Region
          - AMI
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      Tags: 
        - Key: Name
          Value: !Ref MyInstanceName
      SecurityGroupIds:
        - !Ref MySecurityGroup
        
        
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: This will create the SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          ToPort: 80 
          FromPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          ToPort: 22
          FromPort: 22
          CidrIp: 0.0.0.0/0