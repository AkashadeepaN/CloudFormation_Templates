AWSTemplateFormatVersion: '2010-09-09'
Description: This will create IAM User, IAM Group, S3 Bucket.

Resources:
  IAMUser:
    Type: AWS::IAM::User
    Properties:
      UserName: akash-demo-user-009
  
  IAMGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: gp-dev-demo-009
  
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: demo-bucket-adn-009