AWSTemplateFormatVersion: '2010-09-09'

Description: Details of my Stack with Parameters.

Parameters:
  InstanceName:
    Description: Adn-EC2 
    Type: String
    
  KeyName:
    Description: enter the key name
    Type: AWS::EC2::KeyPair::KeyName
  

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0912f71e06545ad88
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: !Ref InstanceName
      SecurityGroupIds:
        - !Ref MySecurityGroup
        
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: This will enable the SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          ToPort: 80
          FromPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          ToPort: 22
          FromPort: 22 
          CidrIp: 0.0.0.0/0